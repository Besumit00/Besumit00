        <rect x="252" y="-14" width="2" height="17" fill="#22D3EE">
          <animate attributeName="opacity" values="1;0;1" dur="0.9s" repeatCount="indefinite"/>
        </rect>
      </g>

      <g font-size="13" fill="#94A3B8" font-family="monospace">
        <text x="0" y="118" opacity="0">&#128205; Location: Gwalior, Madhya Pradesh, India<animate attributeName="opacity" from="0" to="1" begin="2.4s" dur="0.5s" fill="freeze"/></text>
        <text x="0" y="144" opacity="0">&#127891; Education: B.Tech AI &amp; Robotics, MITS Gwalior<animate attributeName="opacity" from="0" to="1" begin="2.7s" dur="0.5s" fill="freeze"/></text>
        <text x="0" y="170" opacity="0">&#9889; Current: Autonomous Delivery Robot (ROS 2)<animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/></text>
        <text x="0" y="196" opacity="0">&#128187; GitHub: github.com/Besumit00<animate attributeName="opacity" from="0" to="1" begin="3.3s" dur="0.5s" fill="freeze"/></text>
        <text x="0" y="222" opacity="0">&#9993; sumit.0sahu2003@gmail.com<animate attributeName="opacity" from="0" to="1" begin="3.6s" dur="0.5s" fill="freeze"/></text>
      </g>

      <g opacity="0">
