    <rect x="0" y="0" width="640" height="500" rx="16" fill="#0F172A" fill-opacity="0.55" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
    <circle cx="24" cy="24" r="6" fill="#f87171"/>
