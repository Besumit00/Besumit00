<svg width="1180" height="610" viewBox="0 0 1180 610" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#030712"/>
    <stop offset="100%" stop-color="#060b18"/>
  </linearGradient>

  <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#7C3AED"/>
    <stop offset="50%" stop-color="#22D3EE"/>
    <stop offset="100%" stop-color="#10B981"/>
    <animate attributeName="x1" values="0%;100%;0%" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="100%;200%;100%" dur="8s" repeatCount="indefinite"/>
  </linearGradient>

  <linearGradient id="asciiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#67E8F9"/>
    <stop offset="50%" stop-color="#A78BFA"/>
    <stop offset="100%" stop-color="#67E8F9"/>
    <animate attributeName="x1" values="0%;100%;0%" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="100%;0%;100%" dur="6s" repeatCount="indefinite"/>
  </linearGradient>

  <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.9"/>
    <stop offset="50%" stop-color="#22D3EE" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#10B981" stop-opacity="0.9"/>
    <animateTransform attributeName="gradientTransform" type="rotate" from="0 590 305" to="360 590 305" dur="12s" repeatCount="indefinite"/>
  </linearGradient>

  <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glowEmerald" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#10B981" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
  </radialGradient>

  <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="5" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
    <path d="M 34 0 L 0 0 0 34" fill="none" stroke="rgba(148,163,184,0.05)" stroke-width="1"/>
  </pattern>

  <clipPath id="cardClip">
    <rect x="4" y="4" width="1172" height="602" rx="26"/>
  </clipPath>
</defs>

<rect x="4" y="4" width="1172" height="602" rx="26" fill="url(#bgGrad)"/>

<g clip-path="url(#cardClip)">
