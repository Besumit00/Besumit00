      <text x="0" y="34" font-size="24" font-weight="bold" fill="url(#accentGrad)" opacity="0">I'm Sumit Sahu<animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.6s" fill="freeze"/></text>

      <!-- typing role cycler -->
      <g transform="translate(0,66)">
        <rect x="-2" y="-16" width="360" height="22" fill="none"/>
        <text font-size="15" fill="#22D3EE" font-family="monospace">
          <tspan opacity="0">AI &amp; Robotics Undergraduate
            <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.22;0.25" dur="16s" begin="1.4s" repeatCount="indefinite"/>
