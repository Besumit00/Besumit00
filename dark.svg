            <rect x="448" y="0" width="60" height="26" rx="13" fill="rgba(124,58,237,.15)" stroke="#7C3AED" stroke-width="1"/>
            <text x="478" y="17" fill="#E9D5FF" text-anchor="middle">ESP32</text>
          </g>
          <!-- row2 -->
          <g transform="translate(0,312)">
            <rect x="0" y="0" width="52" height="26" rx="13" fill="rgba(34,211,238,.15)" stroke="#22D3EE" stroke-width="1"/>
            <text x="26" y="17" fill="#A5F3FC" text-anchor="middle">RViz</text>
            <rect x="60" y="0" width="48" height="26" rx="13" fill="rgba(16,185,129,.15)" stroke="#10B981" stroke-width="1"/>
            <text x="84" y="17" fill="#A7F3D0" text-anchor="middle">TF2</text>
            <rect x="116" y="0" width="44" height="26" rx="13" fill="rgba(124,58,237,.15)" stroke="#7C3AED" stroke-width="1"/>
            <text x="138" y="17" fill="#E9D5FF" text-anchor="middle">SQL</text>
            <rect x="168" y="0" width="52" height="26" rx="13" fill="rgba(34,211,238,.15)" stroke="#22D3EE" stroke-width="1"/>
            <text x="194" y="17" fill="#A5F3FC" text-anchor="middle">Git</text>
            <rect x="228" y="0" width="70" height="26" rx="13" fill="rgba(16,185,129,.15)" stroke="#10B981" stroke-width="1"/>
            <text x="263" y="17" fill="#A7F3D0" text-anchor="middle">Excel</text>
            <rect x="306" y="0" width="94" height="26" rx="13" fill="rgba(124,58,237,.15)" stroke="#7C3AED" stroke-width="1"/>
