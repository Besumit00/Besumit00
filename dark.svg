        <text x="0" y="78" opacity="0">  |   │ ◉ ◉ │   |<animate attributeName="opacity" from="0" to="1" begin="0.76s" dur="0.5s" fill="freeze"/></text>
        <text x="0" y="98" opacity="0">  |   └─────┘   |<animate attributeName="opacity" from="0" to="1" begin="0.98s" dur="0.5s" fill="freeze"/></text>
        <text x="0" y="118" opacity="0">   \___________/<animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.5s" fill="freeze"/></text>
        <text x="0" y="140" opacity="0">      │  │<animate attributeName="opacity" from="0" to="1" begin="1.42s" dur="0.5s" fill="freeze"/></text>
