            <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.22;0.25" dur="16s" begin="5.4s" repeatCount="indefinite"/>
          </tspan>
        </text>
        <text font-size="15" fill="#22D3EE" font-family="monospace">
          <tspan opacity="0">ROS 2 Developer
            <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.22;0.25" dur="16s" begin="9.4s" repeatCount="indefinite"/>
