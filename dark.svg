        <text x="0" y="258" font-size="13" fill="#F8FAFC" font-family="monospace" font-weight="bold">Skills</text>

        <!-- pill rows -->
        <g font-family="monospace" font-size="11.5">
          <!-- row1 -->
          <g transform="translate(0,275)">
            <rect x="0" y="0" width="58" height="26" rx="13" fill="rgba(124,58,237,.15)" stroke="#7C3AED" stroke-width="1"/>
            <text x="29" y="17" fill="#E9D5FF" text-anchor="middle">ROS 2</text>
            <rect x="66" y="0" width="66" height="26" rx="13" fill="rgba(34,211,238,.15)" stroke="#22D3EE" stroke-width="1"/>
            <text x="99" y="17" fill="#A5F3FC" text-anchor="middle">Python</text>
            <rect x="140" y="0" width="70" height="26" rx="13" fill="rgba(16,185,129,.15)" stroke="#10B981" stroke-width="1"/>
            <text x="175" y="17" fill="#A7F3D0" text-anchor="middle">Fusion360</text>
            <rect x="218" y="0" width="76" height="26" rx="13" fill="rgba(124,58,237,.15)" stroke="#7C3AED" stroke-width="1"/>
            <text x="256" y="17" fill="#E9D5FF" text-anchor="middle">Gazebo</text>
            <rect x="302" y="0" width="60" height="26" rx="13" fill="rgba(34,211,238,.15)" stroke="#22D3EE" stroke-width="1"/>
            <text x="332" y="17" fill="#A5F3FC" text-anchor="middle">URDF</text>
            <rect x="370" y="0" width="70" height="26" rx="13" fill="rgba(16,185,129,.15)" stroke="#10B981" stroke-width="1"/>
