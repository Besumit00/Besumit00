<svg width="1180" height="610" viewBox="0 0 1180 610" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#030712"/>
    <stop offset="100%" stop-color="#050a16"/>
  </linearGradient>

  <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#7C3AED"/>
    <stop offset="50%" stop-color="#22D3EE"/>
    <stop offset="100%" stop-color="#10B981"/>
    <animate attributeName="x1" values="0%;100%;0%" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="100%;200%;100%" dur="8s" repeatCount="indefinite"/>
  </linearGradient>

  <linearGradient id="asciiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#22D3EE"/>
    <stop offset="50%" stop-color="#7C3AED"/>
    <stop offset="100%" stop-color="#22D3EE"/>
    <animate attributeName="x1" values="0%;100%;0%" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="100%;0%;100%" dur="6s" repeatCount="indefinite"/>
  </linearGradient>

  <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.9"/>
    <stop offset="50%" stop-color="#22D3EE" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#10B981" stop-opacity="0.9"/>
    <animateTransform attributeName="gradientTransform" type="rotate" from="0 590 305" to="360 590 305" dur="10s" repeatCount="indefinite"/>
  </linearGradient>

  <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glowEmerald" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#10B981" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
  </radialGradient>

  <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="6" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <clipPath id="cardClip">
    <rect x="4" y="4" width="1172" height="602" rx="26"/>
  </clipPath>
</defs>

<rect x="4" y="4" width="1172" height="602" rx="26" fill="url(#bgGrad)"/>

<g clip-path="url(#cardClip)">
  <circle cx="130" cy="120" r="200" fill="url(#glowPurple)">
    <animate attributeName="r" values="180;220;180" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="950" cy="480" r="220" fill="url(#glowCyan)">
    <animate attributeName="r" values="200;240;200" dur="11s" repeatCount="indefinite"/>
  </circle>
  <circle cx="850" cy="90" r="160" fill="url(#glowEmerald)">
    <animate attributeName="r" values="140;180;140" dur="7s" repeatCount="indefinite"/>
  </circle>

  <!-- floating particles -->
  <g fill="#22D3EE">
    <circle cx="90" cy="500" r="2" opacity="0.6"><animate attributeName="cy" values="500;470;500" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="220" cy="80" r="1.6" opacity="0.5"><animate attributeName="cy" values="80;55;80" dur="7s" repeatCount="indefinite"/></circle>
    <circle cx="380" cy="540" r="2" opacity="0.5"><animate attributeName="cy" values="540;510;540" dur="8s" repeatCount="indefinite"/></circle>
    <circle cx="1020" cy="150" r="1.8" opacity="0.5"><animate attributeName="cy" values="150;120;150" dur="6.5s" repeatCount="indefinite"/></circle>
    <circle cx="1100" cy="400" r="2" opacity="0.5"><animate attributeName="cy" values="400;370;400" dur="9s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="60" r="1.6" opacity="0.4"><animate attributeName="cy" values="60;35;60" dur="7.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- scanline sweep -->
  <rect x="0" y="0" width="1180" height="2" fill="url(#accentGrad)" opacity="0.15">
    <animate attributeName="y" values="0;610;0" dur="7s" repeatCount="indefinite"/>
  </rect>

  <!-- divider -->
  <line x1="448" y1="40" x2="448" y2="570" stroke="rgba(255,255,255,.08)" stroke-width="1"/>

  <!-- ================= LEFT PANEL ================= -->
  <g transform="translate(50,60)">
    <text x="0" y="0" font-family="monospace" font-size="12" fill="#94A3B8" opacity="0.8">~/sumit-sahu $ whoami</text>

    <!-- floating ascii portrait block -->
    <g transform="translate(0,30)">
      <animateTransform attributeName="transform" type="translate" values="0,30;0,22;0,30" dur="5s" repeatCount="indefinite" additive="sum"/>
      <g font-family="monospace" font-size="13.5" fill="url(#asciiGrad)" filter="url(#softGlow)">
        <text x="0" y="20" opacity="0">    .-''''''-.<animate attributeName="opacity" from="0" to="1" begin="0.1s" dur="0.6s" fill="freeze"/></text>
        <text x="0" y="40" opacity="0">   /  .-''-.  \<animate attributeName="opacity" from="0" to="1" begin="0.35s" dur="0.6s" fill="freeze"/></text>
        <text x="0" y="60" opacity="0">  /  /  [] [] \  \<animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.6s" fill="freeze"/></text>
        <text x="0" y="80" opacity="0">  | (   ----   ) |<animate attributeName="opacity" from="0" to="1" begin="0.85s" dur="0.6s" fill="freeze"/></text>
        <text x="0" y="100" opacity="0">  \  '-......-'  /<animate attributeName="opacity" from="0" to="1" begin="1.1s" dur="0.6s" fill="freeze"/></text>
        <text x="0" y="120" opacity="0">   '-.________.-'<animate attributeName="opacity" from="0" to="1" begin="1.35s" dur="0.6s" fill="freeze"/></text>
        <text x="0" y="150" opacity="0">     ___/||\___<animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.6s" fill="freeze"/></text>
        <text x="0" y="170" opacity="0">    /   ||   \<animate attributeName="opacity" from="0" to="1" begin="1.85s" dur="0.6s" fill="freeze"/></text>
        <text x="0" y="190" opacity="0">   [ ROBOTICS ]<animate attributeName="opacity" from="0" to="1" begin="2.1s" dur="0.6s" fill="freeze"/></text>
        <text x="0" y="210" opacity="0">    \___||___/<animate attributeName="opacity" from="0" to="1" begin="2.35s" dur="0.6s" fill="freeze"/></text>
        <text x="0" y="230" opacity="0">      /  \  <animate attributeName="opacity" from="0" to="1" begin="2.6s" dur="0.6s" fill="freeze"/></text>
        <text x="0" y="250" opacity="0">     /    \<animate attributeName="opacity" from="0" to="1" begin="2.85s" dur="0.6s" fill="freeze"/></text>
      </g>
    </g>

    <g transform="translate(0,320)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.2s" dur="0.8s" fill="freeze"/>
      <text x="0" y="0" font-family="monospace" font-size="13" fill="#F8FAFC" font-weight="bold">SUMIT SAHU</text>
      <rect x="0" y="12" width="180" height="2" fill="url(#accentGrad)"/>
      <text x="0" y="35" font-family="monospace" font-size="11.5" fill="#94A3B8">AI &amp; Robotics Undergraduate</text>
      <text x="0" y="55" font-family="monospace" font-size="11.5" fill="#94A3B8">Building complete systems:</text>
      <text x="0" y="72" font-family="monospace" font-size="11.5" fill="#94A3B8">CAD &#8594; Embedded &#8594; ROS 2</text>
    </g>
  </g>

  <!-- ================= RIGHT PANEL ================= -->
  <g transform="translate(490,55)">
